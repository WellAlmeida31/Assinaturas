spring:
  application:
    name: assinaturas

  quartz:
    auto-startup: true
    properties:
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.jobStore.isClustered: false
      org.quartz.jobStore.useProperties: true
    jdbc:
      initialize-schema: never
    job-store-type: jdbc

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true

  datasource:
    jdbc-url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/postgres?stringtype=unspecified
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:mysecretpassword}
    driver-class-name: org.postgresql.Driver

asaas:
  server-url: https://api-sandbox.asaas.com
#  server-url: http://localhost:8089

aws:
  endpoint-override: ${AWS_ENDPOINT:http://localhost:4566/}
  access-key-id: ${ACCESS_KEY:test}
  secret-access-key: ${ACCESS_SECRET:test}

feign:
  client:
    config:
      default:
        loggerLevel: FULL

access:
  secret: sandbox/asaas/access_token


  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

com:
  wellsoft:
    amqp:
      createRecurrence:
        queueName: assinaturas.createRecurrence
        exchangeName: assinaturas.createRecurrence.exchange
        concurrentConsumer: 3
        maxConcurrentConsumer: 3
        maxAttempts: 3
        prefetch: 5
      cancelSignature:
        queueName: assinaturas.cancelSignature
        exchangeName: assinaturas.cancelSignature.exchange
        concurrentConsumer: 3
        maxConcurrentConsumer: 3
        maxAttempts: 3

